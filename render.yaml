# Render Blueprint — deploy Pulse's two web services on Render.
#
# PostgreSQL is NOT included here because Render discontinued free Postgres.
# Instead, create a FREE Postgres database at https://neon.tech (takes 1 min),
# then paste the connection string into the DATABASE_URL env var on Render.
# See GET-LIVE-URL.md for full instructions.
#
# How to use:
#   1. Push this repo to GitHub
#   2. Create a free Postgres at https://neon.tech → copy the connection string
#   3. Go to https://dashboard.render.com → "New" → "Blueprint" → select this repo
#   4. Render creates pulse-web + pulse-socket
#   5. Set DATABASE_URL, NEXT_PUBLIC_SOCKET_URL, SOCKET_CORS_ORIGIN (see GET-LIVE-URL.md)

services:
  # ---- Next.js web app ----
  - type: web
    name: pulse-web
    runtime: node
    plan: free
    buildCommand: bun install && bun run build && bun run db:generate
    startCommand: bunx next start -p $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        # PASTE YOUR NEON POSTGRES CONNECTION STRING HERE (from https://neon.tech)
        # Format: postgresql://user:pass@ep-xxx.neon.tech/pulse?sslmode=require
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        # SET AFTER DEPLOY: your pulse-socket URL (https://pulse-socket-xxx.onrender.com)
        sync: false
      - key: NODE_ENV
        value: production

  # ---- Socket.io real-time service ----
  - type: web
    name: pulse-socket
    runtime: node
    plan: free
    rootDir: mini-services/chat-service
    buildCommand: bun install
    startCommand: bun run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SOCKET_PATH
        value: /socket.io
      - key: SOCKET_CORS_ORIGIN
        # SET AFTER DEPLOY: your pulse-web URL (https://pulse-web-xxx.onrender.com)
        sync: false
      - key: NODE_ENV
        value: production
